name: Generate Tetris Animation

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Generate Tetris SVG
        uses: anmol098/waka-readme-stats@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create fake tetris animation
        run: |
          mkdir -p output
          curl -o output/tetris.svg https://raw.githubusercontent.com/platane/snk/output/github-contribution-grid-snake.svg

      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "update tetris animation" || echo "no changes"
          git push
